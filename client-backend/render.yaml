services:
  - type: web
    name: lilchat-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn backend.wsgi
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: lilchat-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://lil-chat-xyet.vercel.app/
    databases:
      - name: lilchat_db
        dbName: lilchat_db
        user: lilchat_user
